name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - "certbot_dns_opusdns/**"
      - "tests/test_integration.py"
      - "pyproject.toml"
      - ".github/workflows/integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests (preview1)
    runs-on: self-hosted
    environment: preview1
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          OPUSDNS_API_KEY: ${{ secrets.OPUSDNS_API_KEY }}
          OPUSDNS_API_ENDPOINT: ${{ secrets.OPUSDNS_API_ENDPOINT }}
          TEST_ZONE_NAME: "certbot-test.opusdns.dev."
        run: |
          NS_IP=$(dig +short ns1.opusdns.dev | head -1)
          TEST_DNS_SERVER="${NS_IP}" pytest tests/test_integration.py -v --timeout=120
